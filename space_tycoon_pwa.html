inner.style.transform='scale('+SC+')';
wrap.appendChild(inner);
function applySize(){computeSize();wrap.style.width=CW+'px';wrap.style.height=CH+'px';inner.style.transform='scale('+SC+')';}
window.addEventListener('resize',applySize);
const gc=document.createElement('canvas');
gc.width=LW;gc.height=LH;gc.style.cssText='display:block;position:absolute;top:0;left:0;';

  medium:{label:'MÉDIO',icon:'⚡',color:'#f0c040',glow:'rgba(240,192,64,0.4)',desc:'Equilíbrio entre desafio e diversão',costMult:1.4,enemyFireBase:80,enemyFireMin:38,enemyFireScalePer:2.5,bossFireBase:45,bossFireMin:22,enemySpd:0.36,enemySpdScale:0.06,bossSpd:0.78,dmgMult:1.0,rewardMult:1.5,scoreMult:1.5},

// Efeito de upgrade na nave
let upgradeFlash=0,upgradeFlashKey='';

function spawnBgSpark(){bgSparks.push({x:Math.random()*W,y:-5,vy:0.35+Math.random()*0.7,life:130+Math.random()*80,col:['#7ef','#fc4','#f75','#5ef08a','#aaf'][Math.floor(Math.random()*5)],r:0.4+Math.random()*1.1,alpha:0.35+Math.random()*0.4});}

function initStars(){
  stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,r:.3+Math.random()*1.4,spd:.12+Math.random()*.6,b:Math.random(),tw:Math.random()*Math.PI*2}));
  nebulas=Array.from({length:4},()=>({x:Math.random()*W,y:Math.random()*H,rx:50+Math.random()*80,ry:35+Math.random()*60,col:['rgba(30,10,55,0.5)','rgba(10,18,65,0.5)','rgba(8,38,18,0.4)','rgba(55,10,18,0.4)','rgba(10,30,60,0.45)'][Math.floor(Math.random()*5)],spd:.025+Math.random()*.055}));
  bgSparks=[];
}

function initGame(fresh){
  if(fresh){state.score=0;state.wave=1;}
  player={x:W/2,y:H-50,w:22,h:20,hp:gMaxHp(),shield:gShield(),shieldCd:0,inv:0,thr:0};
  bullets=[];enemies=[];boss=null;parts=[];floats=[];keys={};shootT=0;waveEnd=false;screenShake=0;
  joyDX=0;joyDY=0;joyActive=false;fireHeld=false;upgradeFlash=0;
  state.running=true;spawnWave();
}

const BNAMES=['DESTRUIDOR','TITAN','OMEGA','REAPER','CRUSHER'];
function spawnBoss(){
  const df=getDiff(),t=Math.min(4,Math.floor((state.wave-5)/5)+1),hp=100+t*80+state.wave*10;
  boss={x:W/2,y:58,w:52,h:42,hp,mhp:hp,spd:df.bossSpd+t*.2,dir:1,cd:Math.round(df.bossFireBase),tier:t,reward:Math.round((600+t*250+state.wave*25)*df.rewardMult),name:BNAMES[Math.floor((state.wave/5-1)%5)%5],ang:0};
  showBossBar();
}
function spawnWave(){
  waveEnd=false;
  if(isBoss()){spawnBoss();return;}
  const df=getDiff(),w=state.wave,count=Math.min(4+Math.floor(w*1.2),16);
  const cols=Math.min(count,4),rows=Math.ceil(count/cols),mx=32,eW=20,eH=16,sx=(W-mx*2)/(Math.max(cols-1,1));
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(r*cols+c>=count)break;
    const tier=Math.min(3,Math.floor(w/4)),hp=(1+tier)*(1+Math.floor(w*.3));
    enemies.push({x:mx+c*sx,y:50+r*44,w:eW,h:eH,hp,mhp:hp,spd:df.enemySpd+w*df.enemySpdScale+tier*.1,dir:1,reward:Math.round((12+tier*18+Math.floor(w*2))*df.rewardMult),tier,cd:Math.floor(Math.random()*df.enemyFireBase+df.enemyFireBase),wob:Math.random()*Math.PI*2,alive:true});
  }
}
function checkClear(){
  if(waveEnd)return;
  if(!boss&&enemies.every(e=>!e.alive)){waveEnd=true;state.running=false;setTimeout(openShopWave,600);}
}
function pAdd(x,y,col,n,big){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=(big?2:1)+Math.random()*3;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:18+Math.random()*22,col,r:1.2+Math.random()*(big?3.5:2)});}}
function fAdd(x,y,t,col){floats.push({x,y,t,col:col||'#fc4',life:65,vy:-1.2});}
const tcol=t=>['#5ef08a','#7ee8ff','#f0c040','#ff9944','#ff4488'][Math.min(t,4)];

function gameLoop(){if(!state.running)return;fid=requestAnimationFrame(gameLoop);update();draw();}

function update(){
  shootT++;
  if(player.inv>0)player.inv--;
  if(player.shieldCd>0)player.shieldCd--;
  player.thr=Math.sin(Date.now()*.015)*.5+.5;
  if(screenShake>0)screenShake-=0.7;
  if(upgradeFlash>0)upgradeFlash--;
  if(Math.random()<0.035)spawnBgSpark();
  for(let i=bgSparks.length-1;i>=0;i--){const s=bgSparks[i];s.y+=s.vy;s.life--;if(s.life<=0||s.y>H)bgSparks.splice(i,1);}
  const sp=gSpd();
  let kx=0,ky=0;
  if(keys['ArrowLeft']||keys['a'])kx=-1;else if(keys['ArrowRight']||keys['d'])kx=1;
  if(keys['ArrowUp']||keys['w'])ky=-1;else if(keys['ArrowDown']||keys['s'])ky=1;
  let jx=0,jy=0;
  if(joyActive){const len=Math.sqrt(joyDX*joyDX+joyDY*joyDY);if(len>2){jx=joyDX/Math.max(len,JOY_R);jy=joyDY/Math.max(len,JOY_R);}}
  const mx=kx||jx,my=ky||jy;
  if(mx)player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+sp*mx));
  if(my)player.y=Math.max(player.h/2+35,Math.min(H-player.h/2,player.y+sp*my));

  const wantFire=keys[' ']||fireHeld;
  if(wantFire&&shootT>=gFD()){
    shootT=0;
    const nGuns=1+gMulti(),bs=gBS();
    // Posições dos canhões dependem do nível de multitiro
    const gunOffsets=[[0],[-9,9],[-13,0,13],[-16,-5,5,16]][Math.min(nGuns-1,3)];
    for(let i=0;i<nGuns;i++){
      bullets.push({x:player.x+gunOffsets[i],y:player.y-player.h*.55,vy:-bs,vx:0,fr:true,dmg:gDmg(),w:3,h:12,gunIdx:i,nGuns});
    }
  }
  for(const sn of stars){sn.y+=sn.spd;if(sn.y>H)sn.y=-2;}
  for(const n of nebulas){n.y+=n.spd;if(n.y>H+100)n.y=-100;}
  const df=getDiff();
  if(boss){
    boss.ang+=.02;boss.x+=boss.spd*boss.dir;
    if(boss.x<boss.w/2+10||boss.x>W-boss.w/2-10)boss.dir*=-1;
    boss.cd--;
    if(boss.cd<=0){
      const ratio=boss.hp/boss.mhp;
      boss.cd=Math.max(df.bossFireMin,df.bossFireBase-Math.floor(state.wave/5)*3);
      const by=boss.y+boss.h/2+4,sp2=2.8+state.wave*.065;
      if(ratio<.4)for(let a=-2;a<=2;a++)bullets.push({x:boss.x+a*13,y:by,vy:sp2+Math.abs(a)*.28,vx:a*0.9,fr:false,dmg:df.dmgMult,w:5,h:10,col:'#f48',isBoss:true});
      else if(ratio<.7)for(let a=-1;a<=1;a++)bullets.push({x:boss.x+a*16,y:by,vy:sp2,vx:a*1.1,fr:false,dmg:df.dmgMult,w:5,h:10,col:'#f75',isBoss:true});
      else bullets.push({x:boss.x,y:by,vy:sp2,vx:0,fr:false,dmg:df.dmgMult,w:5,h:10,col:'#f75',isBoss:true});
    }
    setBossHP(boss.hp/boss.mhp);
  }
  for(const e of enemies){
    if(!e.alive)continue;
    e.wob+=.04;e.x+=e.spd*e.dir;
    if(e.x<e.w/2+5||e.x>W-e.w/2-5){e.dir*=-1;e.y+=12;}
    e.cd--;
    if(e.cd<=0){
      e.cd=Math.max(df.enemyFireMin,df.enemyFireBase-state.wave*df.enemyFireScalePer+Math.floor(Math.random()*28));
      bullets.push({x:e.x,y:e.y+e.h/2+2,vy:2.4+state.wave*.065,vx:0,fr:false,dmg:df.dmgMult,w:4,h:9,col:'#f55'});
    }
  }
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.y+=b.vy;if(b.vx)b.x+=b.vx;
    if(b.y<-20||b.y>H+20||b.x<-20||b.x>W+20){bullets.splice(i,1);continue;}
    if(b.fr){
      let hit=false;
      if(boss&&Math.abs(b.x-boss.x)<boss.w/2+b.w/2&&Math.abs(b.y-boss.y)<boss.h/2+b.h/2){
        boss.hp-=b.dmg;pAdd(b.x,b.y,'#f94',4,false);
        if(boss.hp<=0){state.money+=boss.reward;state.score+=Math.round(boss.reward*getDiff().scoreMult);fAdd(boss.x,boss.y-20,'$'+boss.reward,'#f94');pAdd(boss.x,boss.y,'#f75',32,true);pAdd(boss.x,boss.y,'#fc4',20,true);pAdd(boss.x,boss.y,'#ff4',12,true);boss=null;hideBossBar();if(!waveEnd){waveEnd=true;state.running=false;setTimeout(openShopWave,700);}}
        hit=true;
      }
      if(!hit)for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j];if(!e.alive)continue;
        if(Math.abs(b.x-e.x)<e.w/2+b.w/2&&Math.abs(b.y-e.y)<e.h/2+b.h/2){
          e.hp-=b.dmg;pAdd(b.x,b.y,'#fc4',4,false);
          if(e.hp<=0){e.alive=false;state.money+=e.reward;state.score+=Math.round(e.reward*getDiff().scoreMult);fAdd(e.x,e.y,'$'+e.reward);pAdd(e.x,e.y,tcol(e.tier),12,false);checkClear();}
          hit=true;break;
        }
      }
      if(hit){bullets.splice(i,1);continue;}
    } else {
      if(player.inv<=0&&Math.abs(b.x-player.x)<player.w/2+3&&Math.abs(b.y-player.y)<player.h/2+3){
        if(player.shield>0&&player.shieldCd<=0){player.shield--;player.shieldCd=120;pAdd(player.x,player.y,'#7ef',12,false);screenShake=4;}
        else{player.hp-=b.dmg*10;player.inv=40;pAdd(player.x,player.y,'#f55',12,false);screenShake=7;if(player.hp<=0){doGameOver();return;}}
        bullets.splice(i,1);
      }
    }
  }
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(!p.life)parts.splice(i,1);}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.y+=f.vy;f.life--;if(!f.life)floats.splice(i,1);}
  updateHUD();
}

// ─────────────────────────── DRAW BULLET ───────────────────────────
function drawBullet(b){
  ctx.save();
  if(b.fr){
    // Plasma bolt do jogador — comprido, brilhante, com rastro
    const len=b.h;
    // glow externo
    const grd=ctx.createLinearGradient(b.x,b.y,b.x,b.y+len);
    grd.addColorStop(0,'rgba(120,230,255,0)');grd.addColorStop(0.3,'rgba(80,200,255,0.35)');grd.addColorStop(1,'rgba(80,200,255,0)');
    ctx.fillStyle=grd;ctx.fillRect(b.x-5,b.y-len,10,len+4);
    // núcleo branco-azul
    const core=ctx.createLinearGradient(b.x,b.y-len,b.x,b.y+2);
    core.addColorStop(0,'rgba(255,255,255,0)');core.addColorStop(0.15,'#fff');core.addColorStop(0.5,'#aef');core.addColorStop(1,'rgba(80,200,255,0.3)');
    ctx.fillStyle=core;ctx.fillRect(b.x-1.5,b.y-len,3,len+2);
    // ponta brilhante
    ctx.shadowColor='#7ef';ctx.shadowBlur=8;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(b.x,b.y-len,2,3,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  } else {
    // Tiro inimigo — oval laranja/rosa grande e visível
    const col=b.col||'#f55';
    const iB=b.isBoss;
    const rW=iB?5:4,rH=iB?11:9;
    // glow largo
    ctx.globalAlpha=0.35;
    const g2=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,rW*2.5);
    g2.addColorStop(0,col);g2.addColorStop(1,'transparent');
    ctx.fillStyle=g2;ctx.beginPath();ctx.ellipse(b.x,b.y,rW*2.5,rH*1.8,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // corpo
    ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(b.x,b.y,rW,rH,0,0,Math.PI*2);ctx.fill();
    // núcleo branco
    ctx.fillStyle='#fff';ctx.globalAlpha=0.8;ctx.beginPath();ctx.ellipse(b.x,b.y,rW*.45,rH*.45,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // borda brilhante
    ctx.strokeStyle=iB?'#ffb':'#faa';ctx.lineWidth=0.8;ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.ellipse(b.x,b.y,rW,rH,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ─────────────────────────── DRAW ENEMY ───────────────────────────
function drawEnemy(x,y,w,h,tier,wob){
  const c=tcol(tier);
  ctx.save();ctx.translate(x,y+Math.sin(wob)*1.5);
  // aura glow
  const aura=ctx.createRadialGradient(0,0,0,0,0,w*1.3);
  aura.addColorStop(0,c+'28');aura.addColorStop(1,'transparent');
  ctx.fillStyle=aura;ctx.beginPath();ctx.arc(0,0,w*1.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=c;
  if(tier===0){
    // Tier 0 – vespa
    ctx.beginPath();ctx.moveTo(0,h*.5);ctx.lineTo(-w*.44,-h*.3);ctx.lineTo(-w*.14,-h*.5);ctx.lineTo(0,-h*.15);ctx.lineTo(w*.14,-h*.5);ctx.lineTo(w*.44,-h*.3);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.ellipse(0,-h*.05,w*.11,h*.15,0,0,Math.PI*2);ctx.fill();
    // detalhes asas
    ctx.strokeStyle=c+'99';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(-w*.14,-h*.5);ctx.lineTo(-w*.5,-h*.35);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*.14,-h*.5);ctx.lineTo(w*.5,-h*.35);ctx.stroke();
  } else if(tier===1){
    // Tier 1 – caça
    ctx.beginPath();ctx.moveTo(0,h*.5);ctx.lineTo(-w*.5,-h*.05);ctx.lineTo(-w*.28,-h*.5);ctx.lineTo(w*.28,-h*.5);ctx.lineTo(w*.5,-h*.05);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(-w*.1,-h*.34,w*.2,h*.3);
    ctx.fillStyle=c+'aa';ctx.fillRect(-w*.5,0,w*.15,h*.22);ctx.fillRect(w*.35,0,w*.15,h*.22);
    // janela cockpit
    ctx.fillStyle='rgba(180,240,255,0.4)';ctx.beginPath();ctx.ellipse(0,-h*.12,w*.07,h*.12,0,0,Math.PI*2);ctx.fill();
  } else if(tier===2){
    // Tier 2 – bombardeiro
    ctx.beginPath();ctx.moveTo(0,-h*.5);ctx.lineTo(w*.5,h*.1);ctx.lineTo(w*.28,h*.5);ctx.lineTo(-w*.28,h*.5);ctx.lineTo(-w*.5,h*.1);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.arc(0,0,w*.14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-w*.3,h*.2);ctx.lineTo(-w*.52,h*.1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*.3,h*.2);ctx.lineTo(w*.52,h*.1);ctx.stroke();
    // motor traseiro
    ctx.fillStyle=c+'66';ctx.beginPath();ctx.ellipse(0,h*.42,w*.09,h*.1,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,180,0,0.5)';ctx.beginPath();ctx.ellipse(0,h*.5,w*.05,h*.06,0,0,Math.PI*2);ctx.fill();
  } else {
    // Tier 3 – cruzador
    ctx.beginPath();ctx.moveTo(0,-h*.55);ctx.lineTo(w*.2,-h*.18);ctx.lineTo(w*.55,h*.02);ctx.lineTo(w*.38,h*.5);ctx.lineTo(0,h*.3);ctx.lineTo(-w*.38,h*.5);ctx.lineTo(-w*.55,h*.02);ctx.lineTo(-w*.2,-h*.18);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,90,0,.55)';ctx.beginPath();ctx.arc(0,0,w*.15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,0,.7)';ctx.beginPath();ctx.arc(0,0,w*.07,0,Math.PI*2);ctx.fill();
    // canhões laterais
    ctx.fillStyle=c+'cc';ctx.fillRect(-w*.58,-h*.04,w*.12,h*.1);ctx.fillRect(w*.46,-h*.04,w*.12,h*.1);
  }
  ctx.restore();
}

// ─────────────────────────── DRAW PLAYER ───────────────────────────
function drawPlayer(){
  const{x,y,w,h,thr,inv,shield,shieldCd}=player;
  if(inv>0&&Math.floor(Date.now()/80)%2===0)return;
  const multi=gMulti(); // 0,1,2,3
  const t=Date.now();

  // ── engine glow (mais intenso com speed upgrade) ──
  const engW=3+thr*5,engH=8+thr*14;
  const gl=ctx.createRadialGradient(x,y+h*.55,0,x,y+h*.55,engH);
  gl.addColorStop(0,'rgba(80,200,255,0.85)');gl.addColorStop(0.4,'rgba(40,120,255,0.4)');gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gl;ctx.beginPath();ctx.ellipse(x,y+h*.55,engW,engH,0,0,Math.PI*2);ctx.fill();
  // partícula de propulsão animada
  const flicker=Math.sin(t*.08)*0.4+0.6;
  ctx.globalAlpha=flicker*0.6;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x,y+h*.55+engH*.3,1.5,2.5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // ── outer aura ──
  const og=ctx.createRadialGradient(x,y,0,x,y,w*2);
  og.addColorStop(0,'rgba(80,200,255,0.06)');og.addColorStop(1,'transparent');
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,w*2,0,Math.PI*2);ctx.fill();

  // ── corpo da nave ──
  // Gradiente no corpo para dar volume
  const bodyGrd=ctx.createLinearGradient(x-w*.5,y-h*.5,x+w*.5,y+h*.5);
  bodyGrd.addColorStop(0,'#aef');bodyGrd.addColorStop(0.4,'#7ef');bodyGrd.addColorStop(1,'#46b');
  ctx.fillStyle=bodyGrd;
  ctx.beginPath();ctx.moveTo(x,y-h*.5);ctx.lineTo(x+w*.44,y+h*.5);ctx.lineTo(x+w*.14,y+h*.18);ctx.lineTo(x,y+h*.38);ctx.lineTo(x-w*.14,y+h*.18);ctx.lineTo(x-w*.44,y+h*.5);ctx.closePath();ctx.fill();

  // ── painel cockpit ──
  ctx.fillStyle='rgba(0,200,255,.18)';ctx.fillRect(x-w*.07,y-h*.34,w*.14,h*.36);
  ctx.fillStyle='rgba(160,240,255,0.5)';ctx.beginPath();ctx.ellipse(x,y-h*.12,w*.065,h*.1,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.ellipse(x,y-h*.1,w*.04,h*.07,0,0,Math.PI*2);ctx.fill();

  // ── asas ──
  const wingGrd=ctx.createLinearGradient(x-w*.6,y,x-w*.2,y);
  wingGrd.addColorStop(0,'rgba(60,170,255,0.3)');wingGrd.addColorStop(1,'rgba(100,220,255,0.65)');
  ctx.fillStyle=wingGrd;
  ctx.beginPath();ctx.moveTo(x-w*.44,y+h*.5);ctx.lineTo(x-w*.58,y+h*.62);ctx.lineTo(x-w*.18,y+h*.27);ctx.closePath();ctx.fill();
  const wingGrd2=ctx.createLinearGradient(x+w*.2,y,x+w*.6,y);
  wingGrd2.addColorStop(0,'rgba(100,220,255,0.65)');wingGrd2.addColorStop(1,'rgba(60,170,255,0.3)');
  ctx.fillStyle=wingGrd2;
  ctx.beginPath();ctx.moveTo(x+w*.44,y+h*.5);ctx.lineTo(x+w*.58,y+h*.62);ctx.lineTo(x+w*.18,y+h*.27);ctx.closePath();ctx.fill();

  // ── CANHÕES DE MULTITIRO ──
  // multi=0 → 1 canhão central (implícito no corpo)
  // multi=1 → +2 canhões nas asas (nível 1)
  // multi=2 → +3 (central+2 externos)
  // multi=3 → +4 (2 internos + 2 externos)
  const gunColor='#aef';
  const gunGlow='rgba(100,220,255,0.6)';
  if(multi>=1){
    // canhões nas asas – pares internos
    const pulse=Math.sin(t*.012)*0.3+0.7;
    ctx.fillStyle=gunColor;
    // esquerdo
    ctx.fillRect(x-w*.38,y-h*.08,3,h*.28);
    // direito
    ctx.fillRect(x+w*.35,y-h*.08,3,h*.28);
    // ponteira brilhante
    ctx.globalAlpha=pulse*0.8;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(x-w*.365,y-h*.08,1.5,2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+w*.365,y-h*.08,1.5,2,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  if(multi>=2){
    // canhão central extra (mais comprido)
    ctx.fillStyle=gunColor;ctx.fillRect(x-1.5,y-h*.58,3,h*.12);
    ctx.globalAlpha=0.7;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x,y-h*.58,1.5,2,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  if(multi>=3){
    // canhões externos (mais para fora)
    ctx.fillStyle=gunColor;
    ctx.fillRect(x-w*.56,y+h*.08,3,h*.22);
    ctx.fillRect(x+w*.53,y+h*.08,3,h*.22);
    ctx.globalAlpha=0.6;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(x-w*.545,y+h*.08,1.5,2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+w*.545,y+h*.08,1.5,2,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── EFEITO DE UPGRADE ──
  if(upgradeFlash>0){
    const prog=upgradeFlash/60;
    // anel de energia expansivo
    const ringR=w*(1.2+( 1-prog)*2.5);
    ctx.globalAlpha=prog*.85;
    ctx.strokeStyle='#fc4';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,ringR,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,100,0.5)';ctx.lineWidth=6;ctx.beginPath();ctx.arc(x,y,ringR,0,Math.PI*2);ctx.stroke();
    // partículas orbitando
    for(let i=0;i<6;i++){
      const ang=(t*.004)+(i/6)*Math.PI*2;const pr=w*(0.9+(1-prog)*1.5);
      const px=x+Math.cos(ang)*pr,py=y+Math.sin(ang)*pr;
      ctx.fillStyle='#fc4';ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // ── escudo ──
  if(shield>0&&shieldCd<=0){
    const pa=Math.sin(t*.005)*.22+.52;
    // glow duplo
    ctx.strokeStyle=`rgba(119,238,255,${pa*.5})`;ctx.lineWidth=7;ctx.beginPath();ctx.arc(x,y,w*1.05,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(119,238,255,${pa})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,w*1.05,0,Math.PI*2);ctx.stroke();
    // hexágonos no escudo (decorativos)
    ctx.globalAlpha=pa*.3;ctx.strokeStyle='#7ef';ctx.lineWidth=0.7;
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2+t*.002;const sx=x+Math.cos(a)*w*1.05,sy=y+Math.sin(a)*w*1.05;
      ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// ─────────────────────────── DRAW BOSS ───────────────────────────
function drawBoss(b){
  const c=tcol(b.tier),a=b.ang,t=Date.now();
  // aura exterior pulsante
  const pulse=Math.sin(t*.003)*0.4+0.6;
  const aura=ctx.createRadialGradient(b.x,b.y,4,b.x,b.y,b.w*1.6);
  aura.addColorStop(0,c+'28');aura.addColorStop(0.5,c+'0c');aura.addColorStop(1,'transparent');
  ctx.fillStyle=aura;ctx.beginPath();ctx.arc(b.x,b.y,b.w*1.6,0,Math.PI*2);ctx.fill();
  // glow interno
  const grd=ctx.createRadialGradient(b.x,b.y,2,b.x,b.y,b.w*.8);
  grd.addColorStop(0,c+'30');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(b.x,b.y,b.w*.8,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(b.x,b.y);
  // corpo gradiente
  const bodyG=ctx.createLinearGradient(-b.w*.6,-b.h*.6,b.w*.6,b.h*.6);
  bodyG.addColorStop(0,c);bodyG.addColorStop(0.5,c+'dd');bodyG.addColorStop(1,c+'88');
  ctx.fillStyle=bodyG;
  ctx.beginPath();ctx.moveTo(0,-b.h*.55);ctx.lineTo(b.w*.24,-b.h*.22);ctx.lineTo(b.w*.57,-b.h*.04);ctx.lineTo(b.w*.47,b.h*.3);ctx.lineTo(b.w*.17,b.h*.53);ctx.lineTo(0,b.h*.38);ctx.lineTo(-b.w*.17,b.h*.53);ctx.lineTo(-b.w*.47,b.h*.3);ctx.lineTo(-b.w*.57,-b.h*.04);ctx.lineTo(-b.w*.24,-b.h*.22);ctx.closePath();ctx.fill();
  // núcleo
  ctx.fillStyle='rgba(0,0,0,.42)';ctx.beginPath();ctx.arc(0,0,b.w*.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=c;ctx.globalAlpha=pulse;ctx.beginPath();ctx.arc(0,0,b.w*.09,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  // orbitantes
  for(let i=0;i<4;i++){
    const ang=a+i*Math.PI/2,ox=Math.cos(ang)*b.w*.42,oy=Math.sin(ang)*b.h*.34;
    ctx.fillStyle='rgba(255,150,80,.3)';ctx.beginPath();ctx.arc(ox,oy,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,95,45,.9)';ctx.beginPath();ctx.arc(ox,oy,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(ox,oy,1.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ─────────────────────────── MAIN DRAW ───────────────────────────
function draw(){
  const sh=screenShake>0?{x:(Math.random()-.5)*screenShake,y:(Math.random()-.5)*screenShake}:{x:0,y:0};
  ctx.save();if(screenShake>0)ctx.translate(sh.x,sh.y);
  ctx.fillStyle='#000';ctx.fillRect(-10,-10,W+20,H+20);
  ctx.globalCompositeOperation='screen';
  for(const n of nebulas){ctx.fillStyle=n.col;ctx.beginPath();ctx.ellipse(n.x,n.y,n.rx,n.ry,0,0,Math.PI*2);ctx.fill();}
  ctx.globalCompositeOperation='source-over';
  const t=Date.now()*.001;
  for(const s of stars){const f=.18+s.b*.5+Math.sin(t*1.5+s.tw)*.12;ctx.globalAlpha=Math.max(0.05,f);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  // meteoros
  for(const s of bgSparks){
    ctx.globalAlpha=Math.min(1,s.life/30)*s.alpha;ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha*=0.25;ctx.strokeStyle=s.col;ctx.lineWidth=s.r;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y-s.r*6);ctx.stroke();
  }
  ctx.globalAlpha=1;
  // partículas
  for(const p of parts){ctx.globalAlpha=p.life/40;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  // inimigos + barra HP
  for(const e of enemies){
    if(!e.alive)continue;
    drawEnemy(e.x,e.y,e.w,e.h,e.tier,e.wob);
    const hr=e.hp/e.mhp;
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(e.x-e.w*.55,e.y-e.h*.88,e.w*1.1,5);
    const gc2=ctx.createLinearGradient(e.x-e.w*.55,0,e.x+e.w*.55,0);
    gc2.addColorStop(0,tcol(e.tier));gc2.addColorStop(1,tcol(e.tier)+'88');
    ctx.fillStyle=gc2;ctx.fillRect(e.x-e.w*.55,e.y-e.h*.88,e.w*1.1*hr,5);
  }
  if(boss)drawBoss(boss);
  drawPlayer();
  // balas
  for(const b of bullets)drawBullet(b);
  ctx.globalAlpha=1;
  // textos flutuantes
  for(const f of floats){ctx.globalAlpha=f.life/65;ctx.shadowColor=f.col;ctx.shadowBlur=10;ctx.fillStyle=f.col;ctx.font=`700 ${Math.round(11+Math.max(0,65-f.life)/5)}px sans-serif`;ctx.textAlign='center';ctx.fillText(f.t,f.x,f.y);ctx.shadowBlur=0;}
  ctx.globalAlpha=1;ctx.textAlign='left';
  if(fireHeld&&state.running){ctx.fillStyle='rgba(255,120,120,0.1)';ctx.beginPath();ctx.arc(W-28,H-28,20,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,120,120,0.45)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(W-28,H-28,20,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
}

function joyEnd(e){for(const t of e.changedTouches)if(t.identifier===joyTouchId){joyActive=false;joySetKnob(0,0);break;}}

goScr.innerHTML=`<div style="font-size:30px;font-weight:800;color:#f55;margin-bottom:6px;letter-spacing:3px;text-shadow:0 0 20px rgba(255,60,60,0.5)">DESTRUÍDO</div><div style="width:60px;height:2px;background:linear-gradient(90deg,transparent,#f55,transparent);margin:0 auto 14px"></div><div id="goinfo" style="font-size:12px;color:#888;margin-bottom:4px"></div><div id="gobest" style="font-size:11px;color:#fc4;margin-bottom:22px;text-shadow:0 0 8px rgba(255,196,64,0.3)"></div><button id="bretry" style="display:block;margin:0 auto 8px;background:linear-gradient(135deg,rgba(119,238,255,0.12),rgba(119,238,255,0.03));border:1.5px solid #7ef;color:#7ef;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer;border-radius:6px;letter-spacing:1px;font-family:sans-serif">↺ TENTAR NOVAMENTE</button><button id="bgoshop" style="display:block;margin:0 auto 8px;background:linear-gradient(135deg,rgba(255,196,64,0.10),rgba(255,196,64,0.03));border:1.5px solid #fc4;color:#fc4;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer;border-radius:6px;letter-spacing:1px;font-family:sans-serif">$ GASTAR DINHEIRO</button><button id="bgomenu" style="display:block;margin:0 auto;background:transparent;border:1px solid #222;color:#444;padding:9px 28px;font-size:12px;cursor:pointer;border-radius:6px;font-family:sans-serif">MENU</button>`;
inner.appendChild(goScr);

function showScr(name){
  menuScr.style.display='none';shopScr.style.display='none';goScr.style.display='none';diffScr.style.display='none';
  hud.style.display='none';ctrl.style.display='none';curScreen=name;
  if(name==='menu'){menuScr.style.display='flex';menuRaf=requestAnimationFrame(doMenuBg);}
  else if(name==='shop')shopScr.style.display='flex';
  else if(name==='go')goScr.style.display='flex';
  else if(name==='diff'){diffScr.style.display='flex';renderDiffCards();}
  else if(name==='game'){hud.style.display='flex';ctrl.style.display='block';}
}
function doGameOver(){
  state.running=false;cancelAnimationFrame(fid);fireHeld=false;
  if(state.score>state.bestScore)state.bestScore=state.score;
  if(state.wave>state.bestWave)state.bestWave=state.wave;
  svSave();hideBossBar();
  const df=getDiff();
  document.getElementById('goinfo').textContent='Onda '+state.wave+' · Score '+state.score+' · '+df.icon+' '+df.label;
  document.getElementById('gobest').textContent='Recorde: onda '+state.bestWave+' · score '+state.bestScore;
  showScr('go');
}

function renderShop(){
  const df=getDiff();
  document.getElementById('smoney').textContent='$'+state.money;
  const grid=document.getElementById('sgrid');grid.innerHTML='';
  for(const[k,m]of Object.entries(SMETA)){
    const u=state.upg[k];const mx2=u.l>=u.max;
    const baseCost=mx2?0:u.costs[u.l],cost=mx2?0:Math.round(baseCost*df.costMult);
    const ca=!mx2&&state.money>=cost;
    const d=document.createElement('div');
    const borderCol=mx2?'#1a1a22':ca?'#1e2035':'#111';
    d.style.cssText=`border:1.5px solid ${borderCol};border-radius:9px;padding:11px 10px;background:${ca&&!mx2?'#07081c':'#060610'};cursor:${mx2||!ca?'default':'pointer'};opacity:${mx2||!ca?.5:1};font-family:sans-serif;transition:all .15s;`;
    d.innerHTML=`<div style="font-size:16px;margin-bottom:3px">${m.ic}</div><div style="font-size:11px;font-weight:700;color:#ddd">${m.n}</div><div style="font-size:10px;color:#333;margin:2px 0">Nível ${u.l}/${u.max}</div><div style="font-size:12px;font-weight:700;color:${ca&&!mx2?'#fc4':'#2a2a2a'}">${mx2?'<span style="color:#3a3a3a;font-size:10px">MAX</span>':(!ca?'<span style="color:#2a2a2a">🔒 $'+cost+'</span>':'$'+cost)}</div>`;
    if(!mx2&&ca){
      d.onclick=function(){
        state.money-=cost;u.l++;
        // Disparar efeito de upgrade na nave
        upgradeFlash=60;upgradeFlashKey=k;
        renderShop();svSave();
        const bv=document.getElementById('svbadge');bv.style.opacity=1;setTimeout(()=>bv.style.opacity=0,1800);
      };
      d.addEventListener('mouseenter',()=>{d.style.borderColor=df.color;d.style.boxShadow='0 0 12px '+df.glow;});
      d.addEventListener('mouseleave',()=>{d.style.borderColor=borderCol;d.style.boxShadow='none';});
    }
    grid.appendChild(d);
  }
}
function openShopWave(){
  fireHeld=false;svSave();renderShop();
  const nb=state.wave+1;
  document.getElementById('swi').textContent=(isBoss()?'👑 Chefão derrotado! ':'Onda '+state.wave+' completa! ')+'Próxima: '+nb+(nb%5===0?' — CHEFÃO!':'');
  document.getElementById('bback').textContent='ONDA '+nb+(nb%5===0?' ☠ CHEFÃO':'');
  document.getElementById('bback').onclick=function(){
    state.wave++;waveEnd=false;state.running=true;fireHeld=false;
    player.hp=Math.min(gMaxHp(),player.hp+20);player.shield=gShield();player.inv=0;player.shieldCd=0;
    bullets=[];enemies=[];boss=null;parts=[];floats=[];shootT=0;joyDX=0;joyDY=0;
    hideBossBar();spawnWave();updateHUD();showScr('game');cancelAnimationFrame(fid);gameLoop();
  };
  showScr('shop');
}
function startGame(fresh){cancelAnimationFrame(fid);initGame(fresh);showScr('game');gameLoop();}

let menuRaf=null;
function doMenuBg(){
  if(curScreen!=='menu'&&curScreen!=='diff')return;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='screen';
  for(const n of nebulas){ctx.fillStyle=n.col;ctx.beginPath();ctx.ellipse(n.x,n.y,n.rx,n.ry,0,0,Math.PI*2);ctx.fill();}
  ctx.globalCompositeOperation='source-over';
  const t=Date.now()*.001;
  for(const s of stars){const f=.18+s.b*.42+Math.sin(t*1.5+s.x)*.1;ctx.globalAlpha=Math.max(0.05,f);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=.22;
  const sh=[{x:W*.15+Math.sin(t*.5)*18,y:H*.3+Math.cos(t*.3)*14,tc:0},{x:W*.85+Math.cos(t*.4)*16,y:H*.38+Math.sin(t*.6)*11,tc:1},{x:W*.5+Math.sin(t*.35)*24,y:H*.6+Math.cos(t*.45)*16,tc:2}];
  for(const s of sh){ctx.fillStyle=tcol(s.tc);ctx.beginPath();ctx.moveTo(s.x,s.y-10);ctx.lineTo(s.x+7,s.y+10);ctx.lineTo(s.x,s.y+6);ctx.lineTo(s.x-7,s.y+10);ctx.closePath();ctx.fill();}
  ctx.globalAlpha=1;
  for(const sn of stars){sn.y+=sn.spd*.3;if(sn.y>H)sn.y=-2;}
  menuRaf=requestAnimationFrame(doMenuBg);
}
function updateMenuLabels(){
  const df=getDiff();
  const mb=document.getElementById('mbest');
  if(mb){let txt='';if(state.bestWave>0)txt='recorde: onda '+state.bestWave+' · score '+state.bestScore;if(state.money>0)txt+=(txt?' · ':'')+' $'+state.money+' disponíveis';mb.textContent=txt;}
  const md=document.getElementById('mdiff-label');
  if(md){md.innerHTML=`Modo: <span style="color:${df.color};font-weight:700">${df.icon} ${df.label}</span>`;md.style.color='#444';}
}
ldSave();initStars();updateMenuLabels();showScr('menu');

})();

  const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const mUrl = URL.createObjectURL(mBlob);
  const link = document.createElement('link');
  link.rel='manifest'; link.href=mUrl;
  document.head.appendChild(link);

  // Service Worker inline via blob
  const swCode = `
const CACHE = 'space-tycoon-v1';
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(['./', './index.html']))
      .catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(()=>caches.match('./')))
  );
});
`;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }

  // Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(()=>{ document.getElementById('install-banner').style.display='block'; }, 3000);
  });
  document.getElementById('btn-install').addEventListener('click', ()=>{
    document.getElementById('install-banner').style.display='none';
    if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt=null; }
  });
  document.getElementById('btn-dismiss').addEventListener('click', ()=>{
    document.getElementById('install-banner').style.display='none';
  });
})();
</script>
